{{ endblock }}

{{ block content }}

<style>
    .assignment-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 40px 20px;
        text-align: center;
    }

    .loading-header {
        color: #495057;
        font-size: 2rem;
        font-weight: bold;
        margin-bottom: 30px;
    }

    .loading-box {
        background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
        border: 2px solid #2196f3;
        border-radius: 15px;
        padding: 40px;
        margin: 30px 0;
    }

    .loading-message {
        font-size: 1.2rem;
        color: #1976d2;
        margin-bottom: 30px;
        line-height: 1.5;
    }

    .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #e3f2fd;
        border-top: 4px solid #2196f3;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 20px auto;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .progress-text {
        font-size: 1rem;
        color: #666;
        margin-top: 20px;
        font-style: italic;
    }

    .auto-advance-notice {
        background-color: #fff3cd;
        border: 1px solid #ffeaa7;
        border-radius: 8px;
        padding: 15px;
        margin: 20px 0;
        color: #856404;
        font-size: 0.9rem;
    }
</style>

<div class="assignment-container">
    <h1 class="loading-header">Setting Up Your Session</h1>
    
    <div class="loading-box">
        <div class="loading-message">
            Please wait while we prepare your experimental session...
        </div>
        
        <div class="spinner"></div>

    </div>
    
    <div class="auto-advance-notice">
        <strong>Note:</strong> This page will automatically advance in a few seconds.
    </div>
</div>

<script>
    // Auto-advance after timeout (backup in case timeout doesn't work)
    setTimeout(function() {
        if (document.querySelector('.otree-btn-next')) {
            document.querySelector('.otree-btn-next').click();
        }
    }, 5000);
</script>

{{ endblock }}
