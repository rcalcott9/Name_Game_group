<!DOCTYPE html>
<html>
<head>
    <title>Post-Game Questions Preview</title>
    <style>
        .question-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .main-title {
            color: #dc3545;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .question-section {
            margin-bottom: 40px;
            padding: 25px;
            background: white;
            border-radius: 15px;
            border: 2px solid #007bff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .question-label {
            font-size: 1.2rem;
            font-weight: bold;
            color: #343a40;
            margin-bottom: 15px;
            display: block;
        }

        .radio-group {
            margin: 15px 0;
        }

        .radio-group input[type="radio"] {
            margin-right: 10px;
            transform: scale(1.2);
        }

        .radio-group label {
            font-size: 1.1rem;
            margin-bottom: 8px;
            display: block;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }

        .radio-group label:hover {
            background-color: #f8f9fa;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 10px rgba(0,123,255,0.2);
        }

        .submit-container {
            text-align: center;
            margin-top: 40px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,123,255,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,123,255,0.4);
        }

        .scale-info {
            font-size: 0.9rem;
            color: #6c757d;
            font-style: italic;
            margin-bottom: 10px;
        }

        body {
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="question-container">
    <h1 class="main-title">Post-Game Questions</h1>

    <form>
        <div class="question-section">
            <label class="question-label">1. DYADIC VERSION: Did you and your partner develop a rule for which letter you both chose?</label>
            <div class="radio-group">
                <label><input type="radio" name="developed_rule_dyadic" value="True"> Yes</label>
                <label><input type="radio" name="developed_rule_dyadic" value="False"> No</label>
            </div>
        </div>

        <div class="question-section">
            <label class="question-label">1. GROUP VERSION: Did you and your partners develop a rule for which letter you would choose?</label>
            <div class="radio-group">
                <label><input type="radio" name="developed_rule_group" value="True"> Yes</label>
                <label><input type="radio" name="developed_rule_group" value="False"> No</label>
            </div>
        </div>

        <div class="question-section">
            <label class="question-label" for="decision_explanation">2. Please explain how you decided which letter to choose:</label>
            <textarea name="decision_explanation" id="decision_explanation" placeholder="Please describe your decision-making process..."></textarea>
        </div>

        <div class="question-section">
            <label class="question-label">3. If your partner stopped choosing the letter that you had coordinated on, how morally wrong would that be?</label>
            <div class="scale-info">Scale: 1 = Not at all morally wrong, 7 = Very morally wrong</div>
            <div class="radio-group">
                <label><input type="radio" name="moral_wrongness" value="1"> 1 - Not at all morally wrong</label>
                <label><input type="radio" name="moral_wrongness" value="2"> 2</label>
                <label><input type="radio" name="moral_wrongness" value="3"> 3</label>
                <label><input type="radio" name="moral_wrongness" value="4"> 4</label>
                <label><input type="radio" name="moral_wrongness" value="5"> 5</label>
                <label><input type="radio" name="moral_wrongness" value="6"> 6</label>
                <label><input type="radio" name="moral_wrongness" value="7"> 7 - Very morally wrong</label>
            </div>
        </div>

        <div class="question-section">
            <label class="question-label" for="additional_comments">4. Is there anything else you would like to tell the experimenters?</label>
            <textarea name="additional_comments" id="additional_comments" placeholder="Any additional thoughts, feedback, or observations..."></textarea>
        </div>

        <div class="submit-container">
            <button type="submit" class="btn-primary">Continue</button>
        </div>
    </form>
</div>

</body>
</html>
